version: 2

models:
  - name: stg_markets
    description: Cleaned market-level PredictIt data.
    columns:
      - name: market_id
        tests: [not_null]

  - name: stg_contracts
    description: Cleaned contract-level PredictIt data.
    columns:
      - name: contract_id
        tests: [not_null]

  - name: fct_contract_prices
    description: Historical fact table with contract prices, market context, and bid-ask spreads.

  - name: mart_market_snapshot
    description: Latest available snapshot per market contract with spreads, market status, and contract counts.

  - name: mart_price_trends
    description: Hourly trend table with average prices, spread metrics, price ranges, and daily date dimension.

  - name: mart_contract_leaders
    description: Leaderboard ranking contracts by current price and absolute price movement from the latest snapshot.

  - name: mart_top_movers
    description: Gainers and losers over the last 24 hours with absolute and percentage change calculations.

  - name: mart_rolling_averages
    description: Daily closing prices with 7-day, 14-day, and 30-day rolling moving averages per contract.

  - name: mart_candidate_momentum
    description: 30-day momentum analysis with directional classification (Strong/Moderate/Weak) and momentum ranking.

  - name: mart_turning_points
    description: Detection of significant daily price turning points using 2-stddev threshold per contract.

  - name: mart_volatility_analysis
    description: Volatility metrics (stddev, price range, volatility score) across 7, 30, and 90 day windows.

  - name: mart_spread_analysis
    description: Spread and liquidity analysis with 30-day aggregates, implied volatility, and spread-volatility ratio.

  - name: mart_anomaly_detection
    description: Anomaly detection using z-scores with signal classification (Momentum Breakout, Mean Reversion, Liquidity Risk, Unusual Jump) and strength scoring.
