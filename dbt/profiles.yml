predictit_dbt:
  target: "{{ env_var('DBT_TARGET', 'snowflake') }}"
  outputs:
    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'PREDICTIT') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'ANALYTICS') }}"
      threads: 4
      client_session_keep_alive: false
    duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../../data/warehouse/predictit.duckdb') }}"
      schema: main
